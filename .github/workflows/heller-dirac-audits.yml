name: Heller-Dirac audits

on:
  pull_request:
    paths:
      - "manuscripts/heller-dirac/**"
      - "scripts/heller_dirac_*.py"
      - "requirements-dev.txt"
      - ".github/workflows/heller-dirac-audits.yml"
  push:
    branches:
      - main
    paths:
      - "manuscripts/heller-dirac/**"
      - "scripts/heller_dirac_*.py"
      - "requirements-dev.txt"
      - ".github/workflows/heller-dirac-audits.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  finite-audits:
    name: finite representation audits
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install audit dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run finite Clebsch-Gordan projector audit
        run: python scripts/heller_dirac_cg_audit.py --n 2 3 4

      - name: Run channel-kernel scalar-collapse audit
        run: python scripts/heller_dirac_channel_kernels.py --n 3 4
